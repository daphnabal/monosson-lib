<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצבעה לדמות האהובה - ספריית נווה מונוסון</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 2vh 2vw;
            direction: rtl;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            background: white;
            border-radius: 20px;
            padding: 2vh 3vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 2vh;
            position: relative;
            flex-shrink: 0;
        }

        .admin-button {
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
            border: none;
            font-size: clamp(1.2rem, 3vh, 1.5rem);
            cursor: pointer;
            opacity: 0.3;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .admin-button:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .header-icon {
            font-size: clamp(1.8rem, 3.5vh, 2.5rem);
            margin-bottom: 0.5vh;
        }

        h1 {
            color: #667eea;
            font-size: clamp(1.3rem, 3vh, 2.2rem);
            margin-bottom: 0.5vh;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            transition: opacity 0.3s;
        }

        .subtitle {
            color: #666;
            font-size: clamp(0.9rem, 1.8vh, 1.2rem);
            font-weight: 500;
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1.2vh 1.2vw;
            margin-bottom: 2vh;
            flex-grow: 1;
            min-height: 0;
        }

        .character-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 0.5vh; /* Reduced padding to give images more space */
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .character-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .character-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.6);
        }

        .character-card.selected .character-name {
            color: white;
            font-weight: bold;
        }

        .character-card.selected .book-title {
            color: rgba(255, 255, 255, 0.9);
        }

        .character-card.selected::after {
            content: "✓";
            position: absolute;
            top: 5px;
            left: 5px;
            background: #4CAF50;
            color: white;
            width: clamp(20px, 3vh, 30px);
            height: clamp(20px, 3vh, 30px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(12px, 1.8vh, 18px);
            font-weight: bold;
            animation: checkmark 0.3s ease;
        }

        @keyframes checkmark {
            0% { transform: scale(0) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        /* Increased character image size */
        .character-image {
            width: auto;
            height: auto;
            max-height: 11.5vh; /* Increased from 9vh */
            aspect-ratio: 1/1;
            object-fit: cover;
            margin: 0 auto 0.8vh;
            display: block;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* Increased fallback size to match */
        .character-fallback {
            width: 11.5vh;
            height: 11.5vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 50%;
            margin: 0 auto 0.8vh;
            align-items: center;
            justify-content: center;
            font-size: 4vh;
        }

        .character-name {
            font-size: clamp(0.8rem, 1.8vh, 1.2rem);
            color: #333;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .book-title {
            font-size: clamp(0.6rem, 1.2vh, 0.9rem);
            color: #999;
            margin-top: 0.3vh;
            transition: color 0.3s ease;
        }

        .vote-section {
            text-align: center;
            flex-shrink: 0;
            margin-bottom: 1vh;
        }

        .vote-button {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 1.5vh 4vw;
            font-size: clamp(1.1rem, 2.5vh, 1.5rem);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
            font-family: inherit;
            width: auto;
        }

        .vote-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(76, 175, 80, 0.6);
        }

        .vote-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .error-message {
            color: #f44336;
            font-size: clamp(0.9rem, 1.8vh, 1.1rem);
            margin-top: 0.5vh;
            font-weight: 600;
            height: 1.8vh;
        }

        .sheet-tabs {
            display: flex;
            background: #f5f7fa;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid #ddd;
            width: 70%;
            margin: 0 auto;
        }

        .sheet-tab {
            flex: 1;
            padding: 0.8vh; 
            border: none;
            background: transparent;
            font-size: clamp(0.9rem, 1.5vh, 1.1rem); 
            font-weight: bold;
            color: #888;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            font-family: inherit;
        }

        .sheet-tab:hover {
            background: #e4e8f0;
        }

        .sheet-tab.active {
            color: #667eea;
            background: white;
            border-bottom: 3px solid #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 3vh;
            border-radius: 20px;
            text-align: center;
            animation: slideIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            color: #4CAF50;
            font-size: clamp(1.5rem, 3vh, 2rem);
            margin-bottom: 1.5vh;
        }

        .modal-content p {
            font-size: clamp(1rem, 2vh, 1.3rem);
            color: #333;
        }

        .success-icon {
            font-size: clamp(2.5rem, 6vh, 4rem);
            margin-bottom: 1.5vh;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .admin-panel {
            text-align: right;
            width: 90%;
        }

        .admin-panel h2 {
            color: #667eea;
            margin-bottom: 2vh;
        }

        .vote-stats {
            background: #f5f7fa;
            padding: 1.5vh;
            border-radius: 12px;
            margin-bottom: 2vh;
            max-height: 40vh;
            overflow-y: auto;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8vh;
            border-bottom: 1px solid #ddd;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-character { font-weight: bold; color: #333; }
        .stat-count { color: #667eea; font-weight: bold; font-size: 1.1rem; }

        .admin-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5vh;
        }

        .admin-btn {
            padding: 1vh 1.5vw;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .export-btn { background: #4CAF50; color: white; }
        .export-btn:hover { background: #45a049; transform: translateY(-2px); }
        .clear-btn { background: #f44336; color: white; }
        .clear-btn:hover { background: #da190b; transform: translateY(-2px); }
        .close-btn { background: #666; color: white; }
        .close-btn:hover { background: #555; }

        .password-input {
            width: 100%;
            padding: 1vh;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1.5vh;
            text-align: center;
            font-family: inherit;
        }

        .total-votes {
            font-size: 1.3rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 1.5vh;
        }

        @media (max-width: 600px) {
            .characters-grid {
                gap: 1vh 1vw;
            }
            .character-card {
                padding: 0.5vh;
            }
            .sheet-tabs {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="admin-button" onclick="showAdminPanel()" title="Admin Panel">⚙️</button>
            <div class="header-icon" id="pageIcon">📚</div>
            <h1 id="pageTitle">ספריית נווה מונוסון</h1>
            <p class="subtitle">הצביעו לדמות האהובה עליכם!</p>
        </div>

        <div class="characters-grid" id="charactersGrid">
            </div>

        <div class="vote-section">
            <button class="vote-button" id="voteButton" disabled>הצביעו עכשיו! 🗳️</button>
            <p class="error-message" id="errorMessage"></p>
        </div>

        <div class="sheet-tabs">
            <button class="sheet-tab active" id="tab1" onclick="switchSheet(1)">דמויות ספרות</button>
            <button class="sheet-tab" id="tab2" onclick="switchSheet(2)">דמויות קומיקס</button>
        </div>
    </div>

    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="success-icon">🎉</div>
            <h2>תודה רבה!</h2>
            <p>הצבעתך נקלטה בהצלחה!</p>
        </div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal-content admin-panel">
            <h2>⚙️ פאנל ניהול</h2>
            <div id="adminContent">
                <input type="password" id="adminPassword" class="password-input" placeholder="הזן סיסמה" />
                <button class="admin-btn export-btn" onclick="checkPassword()">כניסה</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "6164";

        // Sheet 1: Original Characters
        const characters1 = [
            { id: 2, name: "ירון זהבי חסמבה", book: "ירון זהבי חסמבה", image: "char2.png" },
            { id: 1, name: "אן שרלי", book: "האסופית", image: "char1.png" },
            { id: 9, name: "אודי שחר", book: "ג'ינג'י", image: "char9.png" },
            { id: 5, name: "הרמיוני", book: "הארי פוטר", image: "char5.png" },
            { id: 4, name: "ציון כהן", book: "אל עצמי", image: "char4.png" },
            { id: 3, name: "בילבי", book: "בילבי בת גרב", image: "char3.png" },
            { id: 6, name: "אייבי ובין", book: "אייבי ובין", image: "char6.png" },
            { id: 7, name: "הנסיך הקטן", book: "הנסיך הקטן", image: "char7.png" },
            { id: 8, name: "ליסה", book: "מדריך לגיבורות על", image: "char8.png" }
        ];

        // Sheet 2: Comic Characters (Placeholders 10-18)
        const characters2 = [
            { id: 10, name: "איש הכלב", book: "", image: "char10.png" },
            { id: 11, name: "אוואטר", book: "", image: "char11.png" },
            { id: 12, name: "מועדון הבייביסיטריות", book: "", image: "char12.png" },
            { id: 13, name: "בון", book: "", image: "char13.png" },
            { id: 14, name: "הילד הכחול", book: "", image: "char14.png" },
            { id: 15, name: "זיטה", book: "", image: "char15.png" },
            { id: 16, name: "מספיקה בקושי", book: "", image: "char16.png" },
            { id: 17, name: "הקמע", book: "", image: "char17.png" },
            { id: 18, name: "אדל", book: "", image: "char18.png" }
        ];

        // Combine for admin logic and lookup
        const allCharacters = [...characters1, ...characters2];

        let selectedCharacter = null;
        let currentSheet = 1;

        function initializeGrid(characterArray) {
            const grid = document.getElementById('charactersGrid');
            grid.innerHTML = ''; 
            
            characterArray.forEach(character => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.dataset.id = character.id;
                
                card.innerHTML = `
                    <img src="${character.image}" alt="${character.name}" class="character-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="character-fallback" style="display: none;">${currentSheet === 1 ? '📚' : '🦸‍♂️'}</div>
                    <div class="character-name">${character.name}</div>
                    <div class="book-title">${character.book}</div>
                `;
                
                card.addEventListener('click', () => selectCharacter(character.id));
                grid.appendChild(card);
            });
        }

        function switchSheet(sheetNum) {
            currentSheet = sheetNum;
            
            // Update Tab UI
            document.querySelectorAll('.sheet-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab${sheetNum}`).classList.add('active');

            // Update Header Text and Grid
            const pageTitle = document.getElementById('pageTitle');
            const pageIcon = document.getElementById('pageIcon');

            if (sheetNum === 1) {
                pageTitle.textContent = "ספריית נווה מונוסון";
                pageIcon.textContent = "📚";
                initializeGrid(characters1);
            } else {
                pageTitle.textContent = "הצבעה לדמות קומיקס אהובה";
                pageIcon.textContent = "🦸‍♂️";
                initializeGrid(characters2);
            }

            resetVoting();
        }

        function selectCharacter(id) {
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            const selectedCard = document.querySelector(`[data-id="${id}"]`);
            selectedCard.classList.add('selected');
            
            selectedCharacter = id;
            document.getElementById('voteButton').disabled = false;
            document.getElementById('errorMessage').textContent = '';
        }

        function submitVote() {
            if (!selectedCharacter) {
                document.getElementById('errorMessage').textContent = 'אנא בחרו דמות לפני ההצבעה';
                return;
            }

            const voteButton = document.getElementById('voteButton');
            voteButton.disabled = true;
            voteButton.textContent = 'שולח הצבעה...';

            saveVote(selectedCharacter);

            setTimeout(() => {
                showSuccessModal();
            }, 300);
        }

        function saveVote(characterId) {
            const characterInfo = allCharacters.find(c => c.id === characterId);
            const timestamp = new Date().toISOString();
            
            let votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            votes.push({
                character_id: characterId,
                character_name: characterInfo.name,
                category: currentSheet === 1 ? 'ספרות' : 'קומיקס',
                timestamp: timestamp
            });
            
            localStorage.setItem('libraryVotes', JSON.stringify(votes));
        }

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            modal.classList.add('show');
            
            setTimeout(() => {
                modal.classList.remove('show');
                resetVoting();
            }, 3000);
        }

        function resetVoting() {
            selectedCharacter = null;
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.getElementById('voteButton').disabled = true;
            document.getElementById('voteButton').textContent = 'הצביעו עכשיו! 🗳️';
            document.getElementById('errorMessage').textContent = '';
        }

        function showAdminPanel() {
            document.getElementById('adminModal').classList.add('show');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').focus();
        }

        function checkPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                showAdminStats();
            } else {
                alert('סיסמה שגויה!');
            }
        }

        function showAdminStats() {
            const votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            const stats = {};
            allCharacters.forEach(char => {
                stats[char.id] = { name: char.name, count: 0 };
            });
            
            votes.forEach(vote => {
                if (stats[vote.character_id]) {
                    stats[vote.character_id].count++;
                }
            });

            let statsHTML = `
                <div class="total-votes">סה"כ הצבעות בכללי: ${votes.length}</div>
                <div class="vote-stats">
            `;
            
            Object.values(stats).forEach(stat => {
                statsHTML += `
                    <div class="stat-row">
                        <span class="stat-character">${stat.name}</span>
                        <span class="stat-count">${stat.count}</span>
                    </div>
                `;
            });
            
            statsHTML += `
                </div>
                <div class="admin-buttons">
                    <button class="admin-btn export-btn" onclick="exportVotes()">📥 יצוא לקובץ CSV</button>
                    <button class="admin-btn clear-btn" onclick="clearVotes()">🗑️ מחק הכל</button>
                    <button class="admin-btn close-btn" onclick="closeAdmin()">סגור</button>
                </div>
            `;

            document.getElementById('adminContent').innerHTML = statsHTML;
        }

        function exportVotes() {
            const votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            if (votes.length === 0) {
                alert('אין הצבעות לייצוא!');
                return;
            }

            let csv = 'Character ID,Character Name,Category,Timestamp\n';
            votes.forEach(vote => {
                csv += `${vote.character_id},"${vote.character_name}","${vote.category}",${vote.timestamp}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `library_votes_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert('הקובץ הורד בהצלחה!');
        }

        function clearVotes() {
            if (confirm('האם אתה בטוח שברצונך למחוק את כל ההצבעות משני העמודים? פעולה זו אינה הפיכה!')) {
                localStorage.removeItem('libraryVotes');
                alert('כל ההצבעות נמחקו!');
                showAdminStats(); 
            }
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('show');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('show');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('adminPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });
        });

        document.getElementById('voteButton').addEventListener('click', submitVote);

        // Start on sheet 1
        switchSheet(1);
    </script>
</body>
</html>
