<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצבעה לדמות האהובה - ספריית נווה מונוסון</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .admin-button {
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .admin-button:hover {
            opacity: 1;
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .character-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 4px solid transparent;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .character-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .character-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .character-card.selected .character-name {
            color: white;
            font-weight: bold;
        }

        .character-card.selected .book-title {
            color: rgba(255, 255, 255, 0.9);
        }

        .character-card.selected::after {
            content: "✓";
            position: absolute;
            top: 10px;
            left: 10px;
            background: #4CAF50;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            animation: checkmark 0.3s ease;
        }

        @keyframes checkmark {
            0% {
                transform: scale(0) rotate(0deg);
            }
            50% {
                transform: scale(1.2) rotate(180deg);
            }
            100% {
                transform: scale(1) rotate(360deg);
            }
        }

        .character-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            margin: 0 auto 15px;
            display: block;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .character-name {
            font-size: 1.5rem;
            color: #333;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .book-title {
            font-size: 1rem;
            color: #999;
            margin-top: 5px;
            transition: color 0.3s ease;
        }

        .vote-section {
            text-align: center;
        }

        .vote-button {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
            font-family: inherit;
        }

        .vote-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(76, 175, 80, 0.6);
        }

        .vote-button:active {
            transform: translateY(-2px);
        }

        .vote-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .error-message {
            color: #f44336;
            font-size: 1.2rem;
            margin-top: 20px;
            font-weight: 600;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            animation: slideIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #4CAF50;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 1.5rem;
            color: #333;
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        /* Admin Panel Styles */
        .admin-panel {
            text-align: right;
        }

        .admin-panel h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .vote-stats {
            background: #f5f7fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-character {
            font-weight: bold;
            color: #333;
        }

        .stat-count {
            color: #667eea;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .admin-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .admin-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .export-btn {
            background: #4CAF50;
            color: white;
        }

        .export-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .clear-btn {
            background: #f44336;
            color: white;
        }

        .clear-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .close-btn {
            background: #666;
            color: white;
        }

        .close-btn:hover {
            background: #555;
        }

        .password-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-family: inherit;
        }

        .total-votes {
            font-size: 1.5rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .characters-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }

            .character-image {
                height: 150px;
            }

            .character-name {
                font-size: 1.2rem;
            }

            .vote-button {
                padding: 15px 40px;
                font-size: 1.5rem;
            }

            .container {
                padding: 20px;
            }

            .modal-content {
                padding: 30px;
                margin: 20px;
            }

            .modal-content h2 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .characters-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.6rem;
            }
        }

        /* Touch-friendly enhancements */
        @media (hover: none) and (pointer: coarse) {
            .character-card {
                padding: 25px;
            }

            .vote-button {
                padding: 25px 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="admin-button" onclick="showAdminPanel()" title="Admin Panel">⚙️</button>
            <div style="font-size: 3rem; margin-bottom: 20px;">📚</div>
            <h1>ספריית נווה מונוסון</h1>
            <p class="subtitle">הצביעו לדמות האהובה עליכם!</p>
        </div>

        <div class="characters-grid" id="charactersGrid">
            <!-- Characters will be dynamically inserted here -->
        </div>

        <div class="vote-section">
            <button class="vote-button" id="voteButton" disabled>הצביעו עכשיו! 🗳️</button>
            <p class="error-message" id="errorMessage"></p>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="success-icon">🎉</div>
            <h2>תודה רבה!</h2>
            <p>הצבעתך נקלטה בהצלחה!</p>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div class="modal" id="adminModal">
        <div class="modal-content admin-panel">
            <h2>⚙️ פאנל ניהול</h2>
            <div id="adminContent">
                <input type="password" id="adminPassword" class="password-input" placeholder="הזן סיסמה" />
                <button class="admin-btn export-btn" onclick="checkPassword()">כניסה</button>
            </div>
        </div>
    </div>

    <script>
        // Admin password (change this!)
        const ADMIN_PASSWORD = "6164";

        // Character data - Actual characters from the library
        const characters = [
            { id: 1, name: "אן שרלי", book: "האסופית", image: "char1.png" },
            { id: 2, name: "ירון זהבי חסמבה", book: "ירון זהבי חסמבה", image: "char2.png" },
            { id: 3, name: "בילבי", book: "בילבי בת גרב", image: "char3.png" },
            { id: 4, name: "ציון כהן", book: "אל עצמי", image: "char4.png" },
            { id: 5, name: "הרמיוני", book: "הארי פוטר", image: "char5.png" },
            { id: 6, name: "אייבי ובין", book: "אייבי ובין", image: "char6.png" },
            { id: 7, name: "הנסיך הקטן", book: "הנסיך הקטן", image: "char7.png" },
            { id: 8, name: "ליסה", book: "מדריך לגיבורות על", image: "char8.png" },
            { id: 9, name: "אודי שחר", book: "ג'ינג'י", image: "char9.png" }
        ];

        let selectedCharacter = null;

        // Initialize the grid
        function initializeGrid() {
            const grid = document.getElementById('charactersGrid');
            
            characters.forEach(character => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.dataset.id = character.id;
                
                card.innerHTML = `
                    <img src="${character.image}" alt="${character.name}" class="character-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div style="display: none; width: 100%; height: 200px; background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); border-radius: 15px; margin-bottom: 15px; align-items: center; justify-content: center; font-size: 3rem;">📚</div>
                    <div class="character-name">${character.name}</div>
                    <div class="book-title">${character.book}</div>
                `;
                
                card.addEventListener('click', () => selectCharacter(character.id));
                grid.appendChild(card);
            });
        }

        // Handle character selection
        function selectCharacter(id) {
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            const selectedCard = document.querySelector(`[data-id="${id}"]`);
            selectedCard.classList.add('selected');
            
            selectedCharacter = id;
            document.getElementById('voteButton').disabled = false;
            document.getElementById('errorMessage').textContent = '';
        }

        // Handle vote submission
        function submitVote() {
            if (!selectedCharacter) {
                document.getElementById('errorMessage').textContent = 'אנא בחרו דמות לפני ההצבעה';
                return;
            }

            const voteButton = document.getElementById('voteButton');
            voteButton.disabled = true;
            voteButton.textContent = 'שולח הצבעה...';

            // Save vote to localStorage
            saveVote(selectedCharacter);

            // Show success
            setTimeout(() => {
                showSuccessModal();
            }, 300);
        }

        // Save vote to localStorage
        function saveVote(characterId) {
            const characterName = characters.find(c => c.id === characterId).name;
            const timestamp = new Date().toISOString();
            
            // Get existing votes
            let votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            // Add new vote
            votes.push({
                character_id: characterId,
                character_name: characterName,
                timestamp: timestamp
            });
            
            // Save back to localStorage
            localStorage.setItem('libraryVotes', JSON.stringify(votes));
        }

        // Show success modal
        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            modal.classList.add('show');
            
            setTimeout(() => {
                modal.classList.remove('show');
                resetVoting();
            }, 3000);
        }

        // Reset voting interface
        function resetVoting() {
            selectedCharacter = null;
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.getElementById('voteButton').disabled = true;
            document.getElementById('voteButton').textContent = 'הצביעו עכשיו! 🗳️';
            document.getElementById('errorMessage').textContent = '';
        }

        // Admin Panel Functions
        function showAdminPanel() {
            document.getElementById('adminModal').classList.add('show');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').focus();
        }

        function checkPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                showAdminStats();
            } else {
                alert('סיסמה שגויה!');
            }
        }

        function showAdminStats() {
            const votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            // Calculate statistics
            const stats = {};
            characters.forEach(char => {
                stats[char.id] = { name: char.name, count: 0 };
            });
            
            votes.forEach(vote => {
                if (stats[vote.character_id]) {
                    stats[vote.character_id].count++;
                }
            });

            // Build stats HTML
            let statsHTML = `
                <div class="total-votes">סה"כ הצבעות: ${votes.length}</div>
                <div class="vote-stats">
            `;
            
            Object.values(stats).forEach(stat => {
                statsHTML += `
                    <div class="stat-row">
                        <span class="stat-character">${stat.name}</span>
                        <span class="stat-count">${stat.count}</span>
                    </div>
                `;
            });
            
            statsHTML += `
                </div>
                <div class="admin-buttons">
                    <button class="admin-btn export-btn" onclick="exportVotes()">📥 יצוא לקובץ CSV</button>
                    <button class="admin-btn clear-btn" onclick="clearVotes()">🗑️ מחק את כל ההצבעות</button>
                    <button class="admin-btn close-btn" onclick="closeAdmin()">סגור</button>
                </div>
            `;

            document.getElementById('adminContent').innerHTML = statsHTML;
        }

        function exportVotes() {
            const votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            if (votes.length === 0) {
                alert('אין הצבעות לייצוא!');
                return;
            }

            // Create CSV content
            let csv = 'Character ID,Character Name,Timestamp\n';
            votes.forEach(vote => {
                csv += `${vote.character_id},"${vote.character_name}",${vote.timestamp}\n`;
            });

            // Create download link
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `library_votes_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert('הקובץ הורד בהצלחה!');
        }

        function clearVotes() {
            if (confirm('האם אתה בטוח שברצונך למחוק את כל ההצבעות? פעולה זו אינה הפיכה!')) {
                localStorage.removeItem('libraryVotes');
                alert('כל ההצבעות נמחקו!');
                showAdminStats(); // Refresh stats
            }
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('show');
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('show');
            }
        }

        // Allow Enter key for password
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('adminPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });
        });

        // Event listeners
        document.getElementById('voteButton').addEventListener('click', submitVote);

        // Initialize on page load
        initializeGrid();
    </script>
</body>
</html>
