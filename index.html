<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצבעה לדמות האהובה - ספריית נווה מונוסון</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; /* Locks the body to exactly the screen height */
            width: 100vw;
            overflow: hidden; /* Kills vertical and horizontal scrolling */
            padding: 2vh 2vw;
            direction: rtl;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 100%; /* Fills the screen minus the body padding */
            background: white;
            border-radius: 20px;
            padding: 2vh 3vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column; /* Stacks header, grid, and footer */
        }

        .header {
            text-align: center;
            margin-bottom: 2vh;
            position: relative;
            flex-shrink: 0; /* Prevents the header from squishing */
        }

        .admin-button {
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
            border: none;
            font-size: clamp(1.2rem, 3vh, 1.5rem);
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .admin-button:hover {
            opacity: 1;
        }

        .header-icon {
            font-size: clamp(2rem, 4vh, 3rem);
            margin-bottom: 1vh;
        }

        h1 {
            color: #667eea;
            font-size: clamp(1.5rem, 3.5vh, 2.5rem); /* Dynamic font sizing */
            margin-bottom: 0.5vh;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            font-size: clamp(1rem, 2vh, 1.3rem);
            font-weight: 500;
        }

        .characters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr); /* Forces exactly 3 rows */
            gap: 1.5vh 1.5vw;
            margin-bottom: 2vh;
            flex-grow: 1; /* Allows grid to take up all remaining vertical space */
            min-height: 0; /* Critical: stops grid items from causing overflow */
        }

        .character-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 1vh;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .character-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .character-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }

        .character-card.selected .character-name {
            color: white;
            font-weight: bold;
        }

        .character-card.selected .book-title {
            color: rgba(255, 255, 255, 0.9);
        }

        .character-card.selected::after {
            content: "✓";
            position: absolute;
            top: 5px;
            left: 5px;
            background: #4CAF50;
            color: white;
            width: clamp(25px, 4vh, 40px);
            height: clamp(25px, 4vh, 40px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(14px, 2vh, 24px);
            font-weight: bold;
            animation: checkmark 0.3s ease;
        }

        @keyframes checkmark {
            0% { transform: scale(0) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        .character-image {
            width: auto;
            height: auto;
            max-height: 12vh; /* Prevents large images from breaking the grid */
            aspect-ratio: 1/1; /* Keeps images perfectly square */
            object-fit: cover;
            margin: 0 auto 1vh;
            display: block;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .character-fallback {
            width: 12vh;
            height: 12vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 50%;
            margin: 0 auto 1vh;
            align-items: center;
            justify-content: center;
            font-size: 4vh;
        }

        .character-name {
            font-size: clamp(0.9rem, 2vh, 1.5rem);
            color: #333;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .book-title {
            font-size: clamp(0.7rem, 1.5vh, 1rem);
            color: #999;
            margin-top: 0.5vh;
            transition: color 0.3s ease;
        }

        .vote-section {
            text-align: center;
            flex-shrink: 0; /* Keeps footer pinned to the bottom */
        }

        .vote-button {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 2vh 4vw;
            font-size: clamp(1.2rem, 3vh, 1.8rem);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
            font-family: inherit;
            width: auto;
        }

        .vote-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(76, 175, 80, 0.6);
        }

        .vote-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .error-message {
            color: #f44336;
            font-size: clamp(1rem, 2vh, 1.2rem);
            margin-top: 1vh;
            font-weight: 600;
            height: 2vh; /* Reserves space so text doesn't push elements up when it appears */
        }

        /* Modal Styles (Unchanged mostly, just responsive sizing) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 4vh;
            border-radius: 30px;
            text-align: center;
            animation: slideIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            color: #4CAF50;
            font-size: clamp(1.8rem, 4vh, 2.5rem);
            margin-bottom: 2vh;
        }

        .modal-content p {
            font-size: clamp(1.2rem, 2.5vh, 1.5rem);
            color: #333;
        }

        .success-icon {
            font-size: clamp(3rem, 8vh, 5rem);
            margin-bottom: 2vh;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* Admin Panel Styles */
        .admin-panel {
            text-align: right;
        }

        .admin-panel h2 {
            color: #667eea;
            margin-bottom: 2vh;
        }

        .vote-stats {
            background: #f5f7fa;
            padding: 2vh;
            border-radius: 15px;
            margin-bottom: 2vh;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 1vh;
            border-bottom: 1px solid #ddd;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-character { font-weight: bold; color: #333; }
        .stat-count { color: #667eea; font-weight: bold; font-size: 1.2rem; }

        .admin-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2vh;
        }

        .admin-btn {
            padding: 1.5vh 2vw;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .export-btn { background: #4CAF50; color: white; }
        .export-btn:hover { background: #45a049; transform: translateY(-2px); }
        .clear-btn { background: #f44336; color: white; }
        .clear-btn:hover { background: #da190b; transform: translateY(-2px); }
        .close-btn { background: #666; color: white; }
        .close-btn:hover { background: #555; }

        .password-input {
            width: 100%;
            padding: 1.5vh;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 2vh;
            text-align: center;
            font-family: inherit;
        }

        .total-votes {
            font-size: 1.5rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 2vh;
        }

        /* Responsive structural adjustments for small mobile phones */
        @media (max-width: 600px) {
            .characters-grid {
                gap: 1vh 1vw;
            }
            .character-card {
                padding: 0.5vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="admin-button" onclick="showAdminPanel()" title="Admin Panel">⚙️</button>
            <div class="header-icon">📚</div>
            <h1>ספריית נווה מונוסון</h1>
            <p class="subtitle">הצביעו לדמות האהובה עליכם!</p>
        </div>

        <div class="characters-grid" id="charactersGrid">
            <!-- Characters will be dynamically inserted here -->
        </div>

        <div class="vote-section">
            <button class="vote-button" id="voteButton" disabled>הצביעו עכשיו! 🗳️</button>
            <p class="error-message" id="errorMessage"></p>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="success-icon">🎉</div>
            <h2>תודה רבה!</h2>
            <p>הצבעתך נקלטה בהצלחה!</p>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div class="modal" id="adminModal">
        <div class="modal-content admin-panel">
            <h2>⚙️ פאנל ניהול</h2>
            <div id="adminContent">
                <input type="password" id="adminPassword" class="password-input" placeholder="הזן סיסמה" />
                <button class="admin-btn export-btn" onclick="checkPassword()">כניסה</button>
            </div>
        </div>
    </div>

    <script>
        // Admin password (change this!)
        const ADMIN_PASSWORD = "6164";

        // Character data - Actual characters from the library
        const characters = [
            { id: 1, name: "אן שרלי", book: "האסופית", image: "char1.png" },
            { id: 2, name: "ירון זהבי חסמבה", book: "ירון זהבי חסמבה", image: "char2.png" },
            { id: 3, name: "בילבי", book: "בילבי בת גרב", image: "char3.png" },
            { id: 4, name: "ציון כהן", book: "אל עצמי", image: "char4.png" },
            { id: 5, name: "הרמיוני", book: "הארי פוטר", image: "char5.png" },
            { id: 6, name: "אייבי ובין", book: "אייבי ובין", image: "char6.png" },
            { id: 7, name: "הנסיך הקטן", book: "הנסיך הקטן", image: "char7.png" },
            { id: 8, name: "ליסה", book: "מדריך לגיבורות על", image: "char8.png" },
            { id: 9, name: "אודי שחר", book: "ג'ינג'י", image: "char9.png" }
        ];

        let selectedCharacter = null;

        // Initialize the grid
        function initializeGrid() {
            const grid = document.getElementById('charactersGrid');
            
            characters.forEach(character => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.dataset.id = character.id;
                
                // Replaced the inline-styled fallback with a clean CSS class to ensure responsive height
                card.innerHTML = `
                    <img src="${character.image}" alt="${character.name}" class="character-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="character-fallback" style="display: none;">📚</div>
                    <div class="character-name">${character.name}</div>
                    <div class="book-title">${character.book}</div>
                `;
                
                card.addEventListener('click', () => selectCharacter(character.id));
                grid.appendChild(card);
            });
        }

        // Handle character selection
        function selectCharacter(id) {
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            const selectedCard = document.querySelector(`[data-id="${id}"]`);
            selectedCard.classList.add('selected');
            
            selectedCharacter = id;
            document.getElementById('voteButton').disabled = false;
            document.getElementById('errorMessage').textContent = '';
        }

        // Handle vote submission
        function submitVote() {
            if (!selectedCharacter) {
                document.getElementById('errorMessage').textContent = 'אנא בחרו דמות לפני ההצבעה';
                return;
            }

            const voteButton = document.getElementById('voteButton');
            voteButton.disabled = true;
            voteButton.textContent = 'שולח הצבעה...';

            // Save vote to localStorage
            saveVote(selectedCharacter);

            // Show success
            setTimeout(() => {
                showSuccessModal();
            }, 300);
        }

        // Save vote to localStorage
        function saveVote(characterId) {
            const characterName = characters.find(c => c.id === characterId).name;
            const timestamp = new Date().toISOString();
            
            // Get existing votes
            let votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            // Add new vote
            votes.push({
                character_id: characterId,
                character_name: characterName,
                timestamp: timestamp
            });
            
            // Save back to localStorage
            localStorage.setItem('libraryVotes', JSON.stringify(votes));
        }

        // Show success modal
        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            modal.classList.add('show');
            
            setTimeout(() => {
                modal.classList.remove('show');
                resetVoting();
            }, 3000);
        }

        // Reset voting interface
        function resetVoting() {
            selectedCharacter = null;
            document.querySelectorAll('.character-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.getElementById('voteButton').disabled = true;
            document.getElementById('voteButton').textContent = 'הצביעו עכשיו! 🗳️';
            document.getElementById('errorMessage').textContent = '';
        }

        // Admin Panel Functions
        function showAdminPanel() {
            document.getElementById('adminModal').classList.add('show');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').focus();
        }

        function checkPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                showAdminStats();
            } else {
                alert('סיסמה שגויה!');
            }
        }

        function showAdminStats() {
            const votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            // Calculate statistics
            const stats = {};
            characters.forEach(char => {
                stats[char.id] = { name: char.name, count: 0 };
            });
            
            votes.forEach(vote => {
                if (stats[vote.character_id]) {
                    stats[vote.character_id].count++;
                }
            });

            // Build stats HTML
            let statsHTML = `
                <div class="total-votes">סה"כ הצבעות: ${votes.length}</div>
                <div class="vote-stats">
            `;
            
            Object.values(stats).forEach(stat => {
                statsHTML += `
                    <div class="stat-row">
                        <span class="stat-character">${stat.name}</span>
                        <span class="stat-count">${stat.count}</span>
                    </div>
                `;
            });
            
            statsHTML += `
                </div>
                <div class="admin-buttons">
                    <button class="admin-btn export-btn" onclick="exportVotes()">📥 יצוא לקובץ CSV</button>
                    <button class="admin-btn clear-btn" onclick="clearVotes()">🗑️ מחק את כל ההצבעות</button>
                    <button class="admin-btn close-btn" onclick="closeAdmin()">סגור</button>
                </div>
            `;

            document.getElementById('adminContent').innerHTML = statsHTML;
        }

        function exportVotes() {
            const votes = JSON.parse(localStorage.getItem('libraryVotes') || '[]');
            
            if (votes.length === 0) {
                alert('אין הצבעות לייצוא!');
                return;
            }

            // Create CSV content
            let csv = 'Character ID,Character Name,Timestamp\n';
            votes.forEach(vote => {
                csv += `${vote.character_id},"${vote.character_name}",${vote.timestamp}\n`;
            });

            // Create download link
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', `library_votes_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert('הקובץ הורד בהצלחה!');
        }

        function clearVotes() {
            if (confirm('האם אתה בטוח שברצונך למחוק את כל ההצבעות? פעולה זו אינה הפיכה!')) {
                localStorage.removeItem('libraryVotes');
                alert('כל ההצבעות נמחקו!');
                showAdminStats(); // Refresh stats
            }
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('show');
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('show');
            }
        }

        // Allow Enter key for password
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('adminPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });
        });

        // Event listeners
        document.getElementById('voteButton').addEventListener('click', submitVote);

        // Initialize on page load
        initializeGrid();
    </script>
</body>
</html>
